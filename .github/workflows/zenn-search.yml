name: Zenn Search

on:
  # UTC 21:00 = JST 06:00
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      issue:
        description: "Post results to this issue number"
        required: true
        default: "2"
      pages:
        description: "How many pages to scan"
        required: false
        default: "5"
      max_items:
        description: "How many items to post"
        required: false
        default: "10"
      dedupe:
        description: "Dedupe mode: local|issue|none"
        required: false
        default: "issue"
      dry_run:
        description: "Do not post comment (print only)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run zenn-search action
        uses: ./
        with:
          repo: ${{ github.repository }}
          issue: ${{ github.event.inputs.issue || '2' }}
          pages: ${{ github.event.inputs.pages || '5' }}
          max_items: ${{ github.event.inputs.max_items || '10' }}
          dedupe: ${{ github.event.inputs.dedupe || 'issue' }}
          dry_run: ${{ github.event.inputs.dry_run || 'false' }}
          profile: .github/zenn-search/profile.json
          output: .local/zenn-search-comment.md
          state_path: .local/zenn-search-state.json
          seen_output: .local/zenn-search-seen-from-issue.txt
