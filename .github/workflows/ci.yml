name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell script
        run: |
          set -euo pipefail
          shellcheck scripts/zenn-search.sh

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Smoke test (help)
        run: |
          set -euo pipefail
          chmod +x scripts/zenn-search.sh
          scripts/zenn-search.sh --help > /tmp/zenn-help.txt
          test -s /tmp/zenn-help.txt

      - name: Smoke test (dry-run)
        run: |
          set -euo pipefail
          chmod +x scripts/zenn-search.sh
          scripts/zenn-search.sh \
            --pages 1 \
            --max-items 3 \
            --include "AI,Claude" \
            --dedupe none \
            --dry-run \
            --output .local/zenn-search-comment.md

          test -f .local/zenn-search-comment.md
