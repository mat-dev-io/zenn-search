name: "Zenn Search"
description: "Fetch recent Zenn articles, rank/filter them, and optionally post to a GitHub Issue"
author: "your-name"

inputs:
  repo:
    description: "Target repository (owner/name) for issue comment"
    required: false
    default: ""
  issue:
    description: "Target issue number for issue comment"
    required: false
    default: ""
  url:
    description: "Zenn list page URL"
    required: false
    default: "https://zenn.dev/articles"
  pages:
    description: "Number of pages to scan"
    required: false
    default: "5"
  max_items:
    description: "Max number of items in output"
    required: false
    default: "10"
  include:
    description: "Comma-separated include keywords"
    required: false
    default: ""
  exclude:
    description: "Comma-separated exclude keywords"
    required: false
    default: ""
  dedupe:
    description: "Dedupe mode: local|issue|none"
    required: false
    default: "issue"
  dry_run:
    description: "If true, prints only and does not post issue comment"
    required: false
    default: "false"
  output:
    description: "Output markdown file path"
    required: false
    default: ".local/zenn-search-comment.md"
  state_path:
    description: "Local dedupe state path"
    required: false
    default: ".local/zenn-search-state.json"
  seen_output:
    description: "Issue-based dedupe extracted URLs file path"
    required: false
    default: ".local/zenn-search-seen-from-issue.txt"
  profile:
    description: "Optional profile json path"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Run zenn-search
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        cd "$GITHUB_ACTION_PATH"

        chmod +x scripts/zenn-search.sh

        output_path="${{ inputs.output }}"
        state_path="${{ inputs.state_path }}"
        seen_output_path="${{ inputs.seen_output }}"
        profile_path="${{ inputs.profile }}"

        # Resolve relative paths from the caller repository root.
        if [[ "$output_path" != /* ]]; then
          output_path="$GITHUB_WORKSPACE/$output_path"
        fi
        if [[ "$state_path" != /* ]]; then
          state_path="$GITHUB_WORKSPACE/$state_path"
        fi
        if [[ "$seen_output_path" != /* ]]; then
          seen_output_path="$GITHUB_WORKSPACE/$seen_output_path"
        fi
        if [[ -n "$profile_path" && "$profile_path" != /* ]]; then
          profile_path="$GITHUB_WORKSPACE/$profile_path"
        fi

        args=(
          --url "${{ inputs.url }}"
          --pages "${{ inputs.pages }}"
          --max-items "${{ inputs.max_items }}"
          --dedupe "${{ inputs.dedupe }}"
          --output "$output_path"
          --state-path "$state_path"
          --seen-output "$seen_output_path"
        )

        if [[ -n "${{ inputs.include }}" ]]; then
          args+=(--include "${{ inputs.include }}")
        fi

        if [[ -n "${{ inputs.exclude }}" ]]; then
          args+=(--exclude "${{ inputs.exclude }}")
        fi

        if [[ -n "$profile_path" ]]; then
          args+=(--profile "$profile_path")
        fi

        if [[ -n "${{ inputs.repo }}" && -n "${{ inputs.issue }}" ]]; then
          args+=(--repo "${{ inputs.repo }}" --issue "${{ inputs.issue }}")
        fi

        if [[ "${{ inputs.dry_run }}" == "true" ]]; then
          args+=(--dry-run)
        fi

        scripts/zenn-search.sh "${args[@]}"

branding:
  icon: "search"
  color: "blue"
